[workspace]
resolver = "3"
members = ["runner", "macros", "tron/tron_defs", "tron/tron_rs", "xtask"]

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["derive"] }
libloading = "0.9.0"
thiserror = "2.0.18"
codingame_macros = { path = "macros" }
tron_defs = {path = "tron/tron_defs"}