[workspace]
resolver = "3"
members = [
    "runner",
    "macros",
    "common",
    "tron/tron_defs",
    "tron/tron_rs",
    "xtask",
    "tron/tron_game",
    "tron/tron_viz",
    "viz",
    "tictactoe/tictactoe_defs",
    "tictactoe/tictactoe_rs",
    "tictactoe/tictactoe_game",
    "tictactoe/tictactoe_viz",
    "tictactoe/tictactoe_cpp",
    "tron/tron_cpp",
    "cpp_flatten",
    "tournament",
    "cg_statement",
    "fantastic_bits/fantastic_bits_defs",
    "fantastic_bits/fantastic_bits_game",
    "fantastic_bits/fantastic_bits_rs",
    "fantastic_bits/fantastic_bits_viz",
    "fantastic_bits/fantastic_bits_cpp",
]

[workspace.package]
version = "0.1.0"
edition = "2024"

# Keep symbols + line tables in release builds so profilers (samply,
# Instruments, perf) can map sampled addresses back to function +
# line. Near-zero binary-size cost vs full debug info; absolutely
# essential for flamegraphs to be useful. cargo also propagates this
# to cc-rs via `DEBUG=true`, so C++ FFI bots get `-g1` automatically.
[profile.release]
debug = "line-tables-only"

[workspace.dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["derive"] }
libloading = "0.9.0"
thiserror = "2.0.18"
codingame_macros = { path = "macros" }
common = { path = "common" }
tron_defs = { path = "tron/tron_defs" }
tron_game = { path = "tron/tron_game" }
tictactoe_defs = { path = "tictactoe/tictactoe_defs" }
tictactoe_game = { path = "tictactoe/tictactoe_game" }
viz = { path = "viz" }
macroquad = "0.4"
egui-macroquad = "0.17"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bincode = "1.3"
cc = "1"
rand = "0.10.1"
fantastic_bits_defs = { path = "fantastic_bits/fantastic_bits_defs" }
fantastic_bits_game = { path = "fantastic_bits/fantastic_bits_game" }
