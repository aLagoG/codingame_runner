[workspace]
resolver = "3"
members = [
    "runner",
    "macros",
    "common",
    "tron/tron_defs",
    "tron/tron_rs",
    "xtask",
    "tron/tron_game",
    "tron/tron_viz",
    "viz",
    "tictactoe/tictactoe_defs",
    "tictactoe/tictactoe_rs",
    "tictactoe/tictactoe_game",
    "tictactoe/tictactoe_viz",
    "tictactoe/tictactoe_cpp",
    "tron/tron_cpp",
    "cpp_flatten",
    "tournament",
]

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["derive"] }
libloading = "0.9.0"
thiserror = "2.0.18"
codingame_macros = { path = "macros" }
common = { path = "common" }
tron_defs = { path = "tron/tron_defs" }
tron_game = { path = "tron/tron_game" }
tictactoe_defs = { path = "tictactoe/tictactoe_defs" }
tictactoe_game = { path = "tictactoe/tictactoe_game" }
viz = { path = "viz" }
macroquad = "0.4"
egui-macroquad = "0.17"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bincode = "1.3"
cc = "1"
